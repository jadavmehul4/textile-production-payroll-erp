services:
  - type: web
    name: textile-erp-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: textile-erp-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: textile-erp-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://textile-erp-frontend.vercel.app

databases:
  - name: textile-erp-db
    plan: free
